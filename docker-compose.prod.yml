version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ti-katalog-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ti_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ti_password}
      POSTGRES_DB: ${POSTGRES_DB:-ti_katalog}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ti_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ti-network

  # Backend API (FastAPI)
  backend:
    image: ti-katalog-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ti-katalog-api
    environment:
      DATABASE_URL: postgresql://ti_user:ti_password@postgres:5432/ti_katalog
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      R2_BUCKET_URL: ${R2_BUCKET_URL}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/backend/__pycache__
    networks:
      - ti-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/admin/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    image: ti-katalog-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://backend:8000
    container_name: ti-katalog-web
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - ti-network
    restart: unless-stopped

  # Nginx (Production reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: ti-katalog-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ti-network
    restart: unless-stopped

  # Redis (Optional caching)
  redis:
    image: redis:7-alpine
    container_name: ti-katalog-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ti-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ti-network:
    driver: bridge
